version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.debug
    ports:
      - "3000:3000"
      - "3004:3004"
      - "9229:9229"
      - "9230:9230"
    volumes:
      - ./frontend:/app/frontend
      - fe_node_modules:/app/frontend/node_modules
      - ./backend/src:/app/backend/src
      - be_node_modules:/app/backend/node_modules
      - fe_data:/app/frontend/data
    environment:
      # FE
      DATABASE_URL: file:/app/frontend/data/dev.db
      SHOPIFY_API_KEY: ${SHOPIFY_API_KEY}
      SHOPIFY_API_SECRET: ${SHOPIFY_API_SECRET}
      CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY}
      APP_URL: ${APP_URL}
      SCOPES: ${SCOPES:-write_products,read_orders}
      BACKEND_URL: http://localhost:3004
      NODE_ENV: development
      # BE
      ALLOWED_ORIGINS: http://localhost:3000
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-ai_assistant_db}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ai_assistant_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  fe_data:
  be_node_modules:
  fe_node_modules:
  pgdata:
